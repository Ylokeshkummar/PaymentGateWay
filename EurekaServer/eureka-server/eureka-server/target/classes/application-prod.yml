# Activate with SPRING_PROFILES_ACTIVE=prod
# All values are overridable via environment variables so the same image
# can be promoted across dev/stage/prod without rebuilding.

server:
  port: ${SERVER_PORT:8761}

eureka:
  client:
    register-with-eureka: ${EUREKA_REGISTER_WITH_EUREKA:false}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:false}
    service-url:
      # For a resilient multi-node cluster, list every peer's own /eureka URL,
      # e.g. http://eureka-1.internal:8761/eureka/,http://eureka-2.internal:8761/eureka/
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  server:
    enable-self-preservation: true
    renewal-percent-threshold: 0.85
    eviction-interval-timer-in-ms: 5000
    # Slightly longer response cache update interval reduces CPU under heavy client load
    response-cache-update-interval-ms: 5000
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

  security:
    username: ${EUREKA_USERNAME}
    password: ${EUREKA_PASSWORD}

management:
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n'
  level:
    root: WARN
    com.example.eurekaserver: INFO
