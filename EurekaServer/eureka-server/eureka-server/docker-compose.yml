version: "3.8"

services:
  eureka-server:
    build: .
    image: eureka-server:1.0.0
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:?set a strong password in .env}
      EUREKA_HOSTNAME: ${EUREKA_HOSTNAME:-localhost}
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE:-http://localhost:8761/eureka/}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8761/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
